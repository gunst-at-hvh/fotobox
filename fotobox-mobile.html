<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fotobox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
:root{--ink:#0e0c0a;--cream:#f0e8d5;--amber:#c8780a;--dim:#2a2010;--muted:#7a6a50;--red:#a01808}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--ink);color:var(--cream);font-family:'DM Mono',monospace;min-height:100dvh;overflow-x:hidden;touch-action:manipulation}

header{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem .55rem;border-bottom:1px solid var(--dim)}
.brand{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--amber)}
.brand em{font-style:italic;color:var(--cream);font-size:.9em}
.drow{display:flex;align-items:center;gap:.4rem;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.drow button{width:24px;height:24px;border-radius:50%;border:1px solid var(--dim);background:transparent;color:var(--cream);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drow button:active{background:var(--dim)}
#dval{color:var(--amber);font-weight:500;min-width:1.8rem;text-align:center}

/* Viewfinder: ratio = STRIP_W/PHOTO_H = 706/748 ≈ 0.943 → matches print crop exactly */
.vf-outer{padding:.65rem .65rem 0;max-width:480px;margin:0 auto;width:100%}
.vf-box{position:relative;width:100%;aspect-ratio:706/748;background:#000;border-radius:3px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.8)}
.vf-box::before,.vf-box::after{content:'';position:absolute;width:15px;height:15px;border-color:var(--amber);border-style:solid;z-index:5;pointer-events:none}
.vf-box::before{top:7px;left:7px;border-width:2px 0 0 2px}
.vf-box::after{bottom:7px;right:7px;border-width:0 2px 2px 0}
video#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
.cd-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.38);z-index:10;pointer-events:none;opacity:0;transition:opacity .15s}
.cd-ov.show{opacity:1}
.cd-n{font-family:'DM Serif Display',serif;font-size:clamp(4.5rem,20vw,7.5rem);color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.9);animation:pn .9s ease-in-out infinite}
@keyframes pn{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.rdy-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.3);z-index:9;pointer-events:none;opacity:0;transition:opacity .2s}
.rdy-ov.show{opacity:1}
.rdy-w{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(3rem,16vw,5.5rem);color:#fff;text-shadow:0 4px 18px rgba(0,0,0,.9);animation:rb .5s ease-in-out infinite alternate}
@keyframes rb{from{transform:scale(1)}to{transform:scale(1.06)}}
.rdy-s{font-size:.6rem;letter-spacing:.25em;color:rgba(255,255,255,.5);margin-top:.3rem}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;transition:opacity .04s}
.flash.on{opacity:1}
.mini-strip{position:absolute;right:6px;bottom:6px;display:flex;flex-direction:column;gap:3px;z-index:8;pointer-events:none}
.mf{width:32px;height:34px;border:1.5px solid rgba(255,255,255,.18);border-radius:2px;background:#111;overflow:hidden;transition:border-color .25s}
.mf.active{border-color:var(--amber)}
.mf.done{border-color:rgba(255,255,255,.5)}
.mf canvas{width:100%;height:100%;display:block}

.dots{display:flex;justify-content:center;gap:9px;margin:.6rem 0 .1rem}
.dot{width:9px;height:9px;border-radius:50%;background:var(--dim);border:1.5px solid #3a2a10;transition:all .2s}
.dot.active{background:var(--red);border-color:var(--red);animation:bl .45s infinite}
.dot.done{background:var(--amber);border-color:var(--amber)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.15}}

.frow{display:flex;gap:.4rem;padding:.5rem .65rem .1rem;max-width:480px;margin:0 auto}
.ftog{flex:1;padding:.44rem .3rem;border:1px solid var(--dim);border-radius:3px;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:2px}
.ftog .ico{font-size:.95rem;line-height:1}
.ftog:active{transform:scale(.95)}
.ftog.on{border-color:var(--amber);background:rgba(200,120,10,.13);color:var(--amber)}

.shutter-area{display:flex;flex-direction:column;align-items:center;margin:.6rem 0 .4rem}
#btn-shoot{width:68px;height:68px;border-radius:50%;border:3px solid var(--amber);background:transparent;cursor:pointer;position:relative}
#btn-shoot::after{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--amber);transition:inset .12s}
#btn-shoot:active::after{inset:9px}
#btn-shoot:disabled{opacity:.28;cursor:default}
#btn-shoot:disabled::after{background:#555}
.slabel{font-size:.5rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:.32rem}

.logo-row{display:flex;align-items:center;gap:.65rem;cursor:pointer;margin:.1rem .65rem .45rem;padding:.5rem .75rem;border:1px dashed var(--dim);border-radius:3px;position:relative;overflow:hidden;max-width:calc(480px - 1.3rem)}
.logo-row:active{background:rgba(255,255,255,.03)}
.lprev{width:42px;height:21px;border:1px solid var(--dim);border-radius:2px;background:#1a1510;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.lprev img{max-width:100%;max-height:100%;object-fit:contain;display:none}
.lprev span{font-size:.45rem;color:var(--muted)}
.ltxt{font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.ltxt b{display:block;color:var(--cream);margin-bottom:1px}
#logo-inp{position:absolute;inset:0;opacity:0;cursor:pointer}

#status{text-align:center;font-size:.52rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);padding:.3rem 1rem;min-height:1.3rem}
#status.ok{color:#4a9}
#status.err{color:var(--red)}

.result{display:none;padding:.55rem .65rem 1.5rem;max-width:480px;margin:0 auto}
.rtitle{font-family:'DM Serif Display',serif;font-style:italic;font-size:.9rem;color:var(--amber);text-align:center;margin-bottom:.5rem}
.thumb-wrap{display:flex;justify-content:center;margin-bottom:.65rem}
#thumb-c{width:auto;max-height:36vh;display:block;border-radius:2px;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.rbtns{display:flex;flex-direction:column;gap:.45rem}
.rbtn{width:100%;padding:.72rem 1rem;border:1px solid;border-radius:3px;background:transparent;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:all .18s;text-align:center}
.rbtn:active{transform:scale(.98)}
.r-print{border-color:var(--amber);color:var(--amber)}
.r-print:active{background:var(--amber);color:var(--ink)}
.r-cloud{border-color:#4a9;color:#4a9}
.r-cloud:active{background:#4a9;color:var(--ink)}
.r-save{border-color:#6a8;color:#6a8}
.r-save:active{background:#6a8;color:var(--ink)}
.r-again{border-color:var(--dim);color:var(--muted)}

#a4c{display:none}
#psheet{display:none;position:fixed;inset:0;background:#fff;z-index:9999}
#psheet img{width:100%;height:100%;object-fit:contain}
@media print{
  body>*{display:none!important}
  #psheet{display:block!important;position:fixed;inset:0}
  #psheet img{width:100%;height:100%;object-fit:fill}
  @page{margin:0;size:A4 portrait}
}
</style>
</head>
<body>

<header>
  <div class="brand">Foto<em>box</em></div>
  <div style="display:flex;align-items:center;gap:.6rem">
    <button id="btn-flip" onclick="flipCam()" style="width:36px;height:36px;border-radius:50%;border:1px solid var(--dim);background:transparent;color:var(--cream);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Kamera wechseln">🔄</button>
    <div class="drow">
      <button onclick="chDelay(-1)">−</button>
      <span id="dval">5 s</span>
      <button onclick="chDelay(1)">+</button>
      Vorlauf
    </div>
  </div>
</header>

<div class="vf-outer">
  <div class="vf-box">
    <video id="vid" autoplay playsinline muted></video>
    <div class="cd-ov" id="cd-ov"><span class="cd-n" id="cd-n">3</span></div>
    <div class="rdy-ov" id="rdy-ov">
      <div class="rdy-w">Ready?</div>
      <div class="rdy-s" id="rdy-s"></div>
    </div>
    <div class="flash" id="flash"></div>
    <div class="mini-strip">
      <div class="mf" id="mf0"></div><div class="mf" id="mf1"></div>
      <div class="mf" id="mf2"></div><div class="mf" id="mf3"></div>
    </div>
  </div>
</div>

<div class="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
</div>

<div class="frow">
  <button class="ftog" id="fbw"  onclick="toggleBW()"><span class="ico">◑</span>S/W</button>
  <button class="ftog" id="fvib" onclick="toggleVib()"><span class="ico">✦</span>Vibrant</button>
</div>

<div class="shutter-area">
  <button id="btn-shoot" disabled onclick="shoot()"></button>
  <div class="slabel">4 Fotos aufnehmen</div>
</div>

<div class="logo-row">
  <div class="lprev"><img id="limg" src="" alt=""><span id="lph">LOGO</span></div>
  <div class="ltxt"><b>Logo hochladen</b>Unten auf Streifen</div>
  <input type="file" id="logo-inp" accept="image/*" onchange="loadLogo(event)">
</div>

<div id="status">Kamera startet …</div>

<div class="result" id="result">
  <div class="rtitle">Dein Streifen ✦</div>
  <div class="thumb-wrap"><canvas id="thumb-c"></canvas></div>
  <div class="rbtns">
    <button class="rbtn r-print" onclick="doPrint()">🖨 Drucken · 3× auf A4</button>
    <button class="rbtn r-cloud" id="btn-cloud" onclick="doCloud()">☁ In Nextcloud speichern</button>
    <button class="rbtn r-save"  onclick="doSave()">↓ Lokal speichern / Teilen</button>
    <button class="rbtn r-again" onclick="resetAll()">↺ Nochmal</button>
  </div>
</div>

<canvas id="a4c"></canvas>
<div id="psheet"><img id="pimg" src="" alt=""></div>

<script>
/* ─── NEXTCLOUD KONFIGURATION ──────────────── */
const NC_URL   = 'https://cloud.vangunsteren.de';
const NC_TOKEN = 'pKtkAPNGGqAQ2eW';

/* ─── A4-LAYOUT  300 DPI = 2480×3508 px ────────
   OUTER:  Außenrand = Druckerrand berücksichtigt (≈5mm)
   INNER:  Abstand zwischen Streifen = 2×OUTER
           → in der Mitte schneiden = je 5mm Spielraum
   LOGO_H: Logo-Bereich am unteren Rand jedes Streifens

   MATHEMATIK:
   STRIP_W×3 + INNER×2 + OUTER×2 = A4W      ✓
   STRIP_H + OUTER×2 = A4H                   ✓
   PHOTO_H×4 + ROW_GAP×3 + LOGO_H = STRIP_H ✓
────────────────────────────────────────────── */
const A4W=2480, A4H=3508;
const OUTER=60, INNER=120, LOGO_H=380, ROW_GAP=8, SHOTS=4;
const STRIP_W     = Math.floor((A4W - 2*OUTER - 2*INNER) / 3);  // = 706
const STRIP_H     = A4H - 2*OUTER;                               // = 3388
const PHOTO_AREA  = STRIP_H - LOGO_H;                            // = 3008
const PHOTO_H     = Math.floor((PHOTO_AREA - (SHOTS-1)*ROW_GAP) / SHOTS); // = 746

/* ─── STATE ────────────────────────────────── */
const DELAYS=[3,5,10]; let delayIdx=1;
let isBW=false, isVib=false, busy=false, frames=[], logoImg=null;
const vid=document.getElementById('vid');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ─── FILTER (pixelbasiert, 100% iOS-kompatibel) ──
   ctx.filter wird auf älteren iOS-Versionen ignoriert.
   Pixel-Manipulation funktioniert auf ALLEN Geräten. */
function applyFilter(ctx,w,h){
  if(!isBW&&!isVib)return;
  const id=ctx.getImageData(0,0,w,h), d=id.data;
  if(isBW){
    for(let i=0;i<d.length;i+=4){
      let g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      g=Math.max(0,Math.min(255,(g-128)*1.6+128));
      d[i]=d[i+1]=d[i+2]=g;
    }
  } else {
    for(let i=0;i<d.length;i+=4){
      const r=d[i],g=d[i+1],b=d[i+2];
      const L=0.299*r+0.587*g+0.114*b;
      d[i]  =Math.max(0,Math.min(255,(L+(r-L)*1.4-128)*1.08+128));
      d[i+1]=Math.max(0,Math.min(255,(L+(g-L)*1.4-128)*1.08+128));
      d[i+2]=Math.max(0,Math.min(255,(L+(b-L)*1.4-128)*1.08+128));
    }
  }
  ctx.putImageData(id,0,0);
}

/* ─── LIVE VORSCHAU (CSS-Filter für flüssige Anzeige) */
function updateLiveFilter(){
  if(isBW)       vid.style.filter='grayscale(1) contrast(1.6)';
  else if(isVib) vid.style.filter='saturate(1.4) contrast(1.08)';
  else           vid.style.filter='none';
}

/* ─── FILTER TOGGLE ────────────────────────── */
function toggleBW(){
  isBW=!isBW; if(isBW)isVib=false;
  document.getElementById('fbw').classList.toggle('on',isBW);
  document.getElementById('fvib').classList.toggle('on',false);
  updateLiveFilter();
}
function toggleVib(){
  isVib=!isVib; if(isVib)isBW=false;
  document.getElementById('fvib').classList.toggle('on',isVib);
  document.getElementById('fbw').classList.toggle('on',false);
  updateLiveFilter();
}

/* ─── KAMERA ────────────────────────────────── */
let camFacing = 'user'; // 'user' = Front, 'environment' = Back

async function startCam(){
  // Vorherigen Stream stoppen falls vorhanden
  if(vid.srcObject) vid.srcObject.getTracks().forEach(t=>t.stop());
  try{
    const s=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:camFacing,width:{ideal:3840},height:{ideal:2160}},audio:false
    });
    vid.srcObject=s; await vid.play();
    // Spiegelung nur bei Frontkamera
    vid.style.transform = camFacing==='user' ? 'scaleX(-1)' : 'none';
    setS('Bereit — Tippe den Auslöser','');
    document.getElementById('btn-shoot').disabled=false;
  }catch(e){ setS('Kamera nicht verfügbar','err') }
}

function flipCam(){
  camFacing = camFacing==='user' ? 'environment' : 'user';
  const btn = document.getElementById('btn-flip');
  btn.style.transform = camFacing==='environment' ? 'scaleX(-1)' : '';
  startCam();
}

/* ─── CAPTURE ───────────────────────────────────
   Filter per Pixel-Manipulation — zuverlässig auf iOS 12+  */
function captureFrame(){
  const vW=vid.videoWidth||640, vH=vid.videoHeight||480;
  const c=document.createElement('canvas');
  c.width=vW; c.height=vH;
  const ctx=c.getContext('2d',{willReadFrequently:true});
  if(camFacing==='user'){
    // Frontkamera: gespiegelt zeichnen (Selfie-Ansicht)
    ctx.save(); ctx.translate(vW,0); ctx.scale(-1,1);
    ctx.drawImage(vid,0,0,vW,vH);
    ctx.restore();
  } else {
    // Rückkamera: normal
    ctx.drawImage(vid,0,0,vW,vH);
  }
  applyFilter(ctx,vW,vH);
  return c;
}

/* ─── HELPERS ───────────────────────────────── */
function setS(t,cls){const e=document.getElementById('status');e.textContent=t;e.className=cls||''}
function setDot(i,s){document.getElementById('d'+i).className='dot'+(s==='active'?' active':s==='done'?' done':'')}
function setMF(i,s,src){
  const el=document.getElementById('mf'+i);
  el.className='mf'+(s==='active'?' active':s==='done'?' done':'');
  if(src){el.innerHTML='';const tc=document.createElement('canvas');tc.width=64;tc.height=68;tc.style.cssText='width:100%;height:100%;display:block';const ctx=tc.getContext('2d');const sc=Math.max(64/src.width,68/src.height);ctx.drawImage(src,(64-src.width*sc)/2,(68-src.height*sc)/2,src.width*sc,src.height*sc);el.appendChild(tc)}
}
function chDelay(d){delayIdx=((delayIdx+d)%DELAYS.length+DELAYS.length)%DELAYS.length;document.getElementById('dval').textContent=DELAYS[delayIdx]+' s'}
function fname(){const n=new Date(),p=x=>String(x).padStart(2,'0');return`fotobox_${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}_${p(n.getHours())}-${p(n.getMinutes())}-${p(n.getSeconds())}.jpg`}

/* ─── SHOOT ─────────────────────────────────── */
async function shoot(){
  if(busy)return; busy=true; frames=[];
  const delay=DELAYS[delayIdx];
  const btn=document.getElementById('btn-shoot');
  btn.disabled=true; document.getElementById('result').style.display='none';
  for(let i=0;i<SHOTS;i++){setDot(i,'');setMF(i,'',null)}
  const cdOv=document.getElementById('cd-ov'), cdN=document.getElementById('cd-n');
  const rdyOv=document.getElementById('rdy-ov'), rdyS=document.getElementById('rdy-s');
  const fl=document.getElementById('flash');

  for(let i=0;i<SHOTS;i++){
    setDot(i,'active'); setMF(i,'active',null);
    if(i>0){
      rdyS.textContent=`Foto ${i+1} von ${SHOTS}`;
      rdyOv.classList.add('show'); setS(`Foto ${i+1} — Ready?`);
      await sleep(1300); rdyOv.classList.remove('show'); await sleep(130);
    } else { setS('Foto 1 — Countdown …') }

    cdOv.classList.add('show');
    for(let s=delay;s>=1;s--){cdN.textContent=s;await sleep(900)}
    cdOv.classList.remove('show'); await sleep(70);

    fl.classList.add('on'); await sleep(60); fl.classList.remove('on');
    frames.push(captureFrame());
    setDot(i,'done'); setMF(i,'done',frames[i]); await sleep(280);
  }

  setS('Fertig!','ok'); buildResult(); busy=false; btn.disabled=false;
}

/* ─── LOGO ──────────────────────────────────── */
function loadLogo(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=ev=>{const img=new Image();img.onload=()=>{logoImg=img;const pi=document.getElementById('limg');pi.src=ev.target.result;pi.style.display='block';document.getElementById('lph').style.display='none';if(frames.length===SHOTS)buildResult()};img.src=ev.target.result};r.readAsDataURL(f);
}

/* ─── BUILD STRIP ──────────────────────────────
   Mathematik geprüft:
   py[i] = i*(PHOTO_H+ROW_GAP)
   py[3]+PHOTO_H = 3*(746+8)+746 = 2262+746 = 3008 = PHOTO_AREA ✓
   Logo: 3008..3388 = STRIP_H ✓                              */
function buildStrip(){
  const c=document.createElement('canvas'); c.width=STRIP_W; c.height=STRIP_H;
  const ctx=c.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,STRIP_W,STRIP_H);

  frames.forEach((src,i)=>{
    const py=i*(PHOTO_H+ROW_GAP);
    const sc=Math.max(STRIP_W/src.width,PHOTO_H/src.height);
    const dw=src.width*sc, dh=src.height*sc;
    ctx.save(); ctx.beginPath(); ctx.rect(0,py,STRIP_W,PHOTO_H); ctx.clip();
    ctx.drawImage(src,(STRIP_W-dw)/2,py+(PHOTO_H-dh)/2,dw,dh);
    ctx.restore();
  });

  // Logo
  const ly=PHOTO_AREA;
  ctx.fillStyle='#fff'; ctx.fillRect(0,ly,STRIP_W,LOGO_H);
  if(logoImg){
    const mW=STRIP_W*.82, mH=LOGO_H*.78;
    const sc=Math.min(mW/logoImg.width,mH/logoImg.height);
    const lw=logoImg.width*sc, lh=logoImg.height*sc;
    ctx.drawImage(logoImg,(STRIP_W-lw)/2,ly+(LOGO_H-lh)/2,lw,lh);
  } else {
    ctx.setLineDash([8,5]); ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=2;
    ctx.strokeRect(STRIP_W*.07,ly+LOGO_H*.1,STRIP_W*.86,LOGO_H*.8); ctx.setLineDash([]);
    ctx.fillStyle='#d0d0d0'; ctx.font=`${Math.round(LOGO_H*.14)}px sans-serif`; ctx.textAlign='center';
    ctx.fillText('LOGO',STRIP_W/2,ly+LOGO_H*.56);
  }
  return c;
}

/* ─── BUILD A4 ─────────────────────────────────
   Weißer Hintergrund, kein schwarzer Balken.
   Streifen-Positionen:
   col=0: x=60
   col=1: x=60+706+120=886
   col=2: x=60+2×706+2×120=1592
   Rechts: 1592+706=2298, +60 Rand=2358... warte

   Lass mich nochmal prüfen:
   STRIP_W = floor((2480-120-240)/3) = floor(2120/3) = 706
   3×706=2118, +2×120=240, +2×60=120 → 2118+240+120=2478 ≈ 2480 ✓ (2px Rundung ok)
───────────────────────────────────────────────── */
function buildA4(){
  const a4=document.getElementById('a4c'); a4.width=A4W; a4.height=A4H;
  const ctx=a4.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,A4W,A4H);  // Weiß — kein schwarzer Balken!

  const strip=buildStrip();
  for(let col=0;col<3;col++){
    ctx.drawImage(strip, OUTER+col*(STRIP_W+INNER), OUTER);
  }

  // Gestrichelte Schnittlinie mittig im INNER-Abstand
  ctx.save(); ctx.setLineDash([14,9]); ctx.strokeStyle='rgba(185,185,185,0.7)'; ctx.lineWidth=2.5;
  for(let i=0;i<2;i++){
    const cx=OUTER+(i+1)*STRIP_W+(i+1)*INNER - INNER/2;
    ctx.beginPath(); ctx.moveTo(cx,OUTER*.2); ctx.lineTo(cx,A4H-OUTER*.2); ctx.stroke();
  }
  ctx.restore();

  // Scherensymbole
  ctx.fillStyle='rgba(170,170,170,0.75)'; ctx.font=`${Math.round(OUTER*.52)}px sans-serif`; ctx.textAlign='center';
  for(let i=0;i<2;i++){
    const cx=OUTER+(i+1)*STRIP_W+(i+1)*INNER - INNER/2;
    ctx.fillText('✂',cx,OUTER*.72); ctx.fillText('✂',cx,A4H-OUTER*.08);
  }
}

/* ─── RESULT ────────────────────────────────── */
function buildResult(){
  buildA4();
  const strip=buildStrip();
  const thumb=document.getElementById('thumb-c');
  // Thumbnail bei 25% Auflösung — CSS max-height:36vh skaliert ihn auf Bildschirm
  thumb.width=Math.round(STRIP_W*.25); thumb.height=Math.round(STRIP_H*.25);
  const ctx=thumb.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.drawImage(strip,0,0,thumb.width,thumb.height);
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ─── DRUCKEN ───────────────────────────────────────────────────
   Kein JPEG-Foto-Print (falsche Skalierung auf iOS).
   Stattdessen: HTML mit mm-Einheiten → browser druckt als Dokument.

   WICHTIG: Alles synchron (toDataURL statt toBlob) damit
   window.open() noch im User-Gesture-Kontext liegt → iOS lässt es durch.

   Layout (mm):
   A4: 210 × 297mm
   Außenrand: 5mm je Seite → Innenbereich: 200 × 287mm
   Abstand zwischen Streifen: 10mm (je 5mm Schnittzugabe)
   Streifen-Breite: (200 - 2×10) / 3 = 60mm
   Streifen-Höhe: 287mm
   Logo-Bereich: 32mm (unten)
   4 Fotos: (287 - 32) / 4 = 63.75mm je Foto
────────────────────────────────────────────────────────────────── */
function doPrint() {
  if (!frames.length) return;

  // ① Frames als Data-URLs — synchron, kein async-Gap
  const fUrls = frames.map(c => c.toDataURL('image/jpeg', 0.92));

  // ② Logo-URL (falls vorhanden)
  let logoUrl = '';
  if (logoImg) {
    const lc = document.createElement('canvas');
    lc.width = logoImg.width; lc.height = logoImg.height;
    lc.getContext('2d').drawImage(logoImg, 0, 0);
    logoUrl = lc.toDataURL('image/png');
  }

  // ③ Ein Streifen als HTML (3× wiederholt)
  const strip = `<div class="strip">
    ${fUrls.map(u => `<div class="photo"><img src="${u}"></div>`).join('')}
    <div class="logo">${logoUrl
      ? `<img src="${logoUrl}">`
      : `<div class="logo-ph">LOGO</div>`
    }</div>
  </div>`;

  // ④ Vollständiges A4-HTML mit mm-Einheiten
  const html = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  @page{margin:0;size:210mm 297mm portrait}
  html{width:210mm;height:297mm;overflow:hidden}
  body{
    width:210mm;height:297mm;overflow:hidden;
    background:white;display:flex;flex-direction:row;
    padding:5mm;gap:10mm;
    page-break-inside:avoid;break-inside:avoid;
  }
  .strip{
    width:60mm;height:287mm;flex-shrink:0;
    display:flex;flex-direction:column;overflow:hidden;
    page-break-inside:avoid;break-inside:avoid;
  }
  .photo{
    flex:1;overflow:hidden;min-height:0;
    /* Cover-crop: Bild füllt Zelle komplett */
  }
  .photo img{
    width:100%;height:100%;
    object-fit:cover;display:block;
  }
  .logo{
    height:32mm;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .logo img{max-width:90%;max-height:90%;object-fit:contain;display:block}
  .logo-ph{
    font-family:sans-serif;font-size:11pt;color:#ccc;
    border:1px dashed #e0e0e0;padding:6mm 12mm;
  }
  /* Schnittlinie zwischen Streifen */
  .strip:not(:last-child)::after{
    /* Kein echter Inhalt — Schnittlinie ist der Abstand (gap:10mm) */
    content:'';
  }
</style>
</head>
<body>
  ${strip}${strip}${strip}
  <script>
    // Drucken sobald alle Bilder geladen
    var imgs=document.images, total=imgs.length, loaded=0;
    function tryPrint(){if(++loaded>=total)window.print();}
    if(total===0){window.print();}
    else{for(var i=0;i<total;i++){
      if(imgs[i].complete)tryPrint();
      else imgs[i].onload=imgs[i].onerror=tryPrint;
    }}
  <\/script>
</body>
</html>`;

  // ⑤ Neues Fenster synchron öffnen — noch im User-Gesture-Kontext → iOS erlaubt es
  const w = window.open('', '_blank');
  if (w) {
    w.document.open();
    w.document.write(html);
    w.document.close();
  } else {
    // Popup geblockt: Bild als JPEG teilen → Nutzer druckt aus Fotos
    setS('Popup blockiert — bitte "Lokal speichern" → aus Fotos drucken', 'err');
  }
}

/* ─── NEXTCLOUD UPLOAD (WebDAV auf Public Share) */
async function doCloud(){
  const btn=document.getElementById('btn-cloud');
  btn.textContent='☁ Lädt hoch …'; btn.disabled=true;
  try{
    const blob=await new Promise(r=>document.getElementById('a4c').toBlob(r,'image/jpeg',0.97));
    const fn=fname();
    const res=await fetch(`${NC_URL}/public.php/webdav/${fn}`,{
      method:'PUT',
      headers:{'Authorization':'Basic '+btoa(NC_TOKEN+':'),'Content-Type':'image/jpeg'},
      body:blob
    });
    if(res.ok||res.status===201||res.status===204){
      setS('☁ Gespeichert: '+fn,'ok'); btn.textContent='☁ Erneut hochladen';
    } else { throw new Error('HTTP '+res.status) }
  }catch(e){
    setS('Upload fehlgeschlagen: '+e.message,'err'); btn.textContent='☁ Erneut versuchen';
  }
  btn.disabled=false;
}

/* ─── LOKAL SPEICHERN / TEILEN ──────────────── */
async function doSave(){
  const blob=await new Promise(r=>document.getElementById('a4c').toBlob(r,'image/jpeg',0.97));
  const fn=fname();
  if(navigator.canShare&&navigator.canShare({files:[new File([blob],fn,{type:'image/jpeg'})]})){
    try{await navigator.share({files:[new File([blob],fn,{type:'image/jpeg'})],title:'Fotobox'});return}
    catch(e){if(e.name==='AbortError')return}
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fn; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}

/* ─── RESET ─────────────────────────────────── */
function resetAll(){
  frames=[]; busy=false;
  document.getElementById('result').style.display='none';
  document.getElementById('btn-cloud').textContent='☁ In Nextcloud speichern';
  document.getElementById('btn-cloud').disabled=false;
  for(let i=0;i<SHOTS;i++){setDot(i,'');setMF(i,'',null)}
  setS('Bereit — Tippe den Auslöser','');
  window.scrollTo({top:0,behavior:'smooth'});
}

startCam();
